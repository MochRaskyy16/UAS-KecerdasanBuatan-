<svg width="1200" height="220" viewBox="0 0 1200 220" xmlns="http://www.w3.org/2000/svg">

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0d0d0d"/>
      <stop offset="100%" stop-color="#1a0000"/>
    </linearGradient>

    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <clipPath id="typing">
      <rect x="90" y="55" width="0" height="70">
        <animate
          attributeName="width"
          from="0"
          to="1020"
          dur="2.8s"
          fill="freeze"/>
      </rect>
    </clipPath>
  </defs>

  <!-- Background -->
  <rect width="1200" height="220" rx="8" fill="url(#bg)"/>

  <!-- Border -->
  <rect
      x="2"
      y="2"
      width="1196"
      height="216"
      rx="8"
      fill="none"
      stroke="#ff0033"
      stroke-width="2"/>

  <!-- Main Title -->
  <g clip-path="url(#typing)">
    <text
      x="90"
      y="105"
      font-size="48"
      font-family="'Share Tech Mono', monospace"
      fill="#ff0033"
      filter="url(#glow)">
      UAS-KECERDASAN BUATAN
    </text>
  </g>

  <!-- Cursor -->
  <rect x="90" y="66" width="4" height="46" fill="#ff0033">
    <animate
      attributeName="x"
      from="90"
      to="1020"
      dur="2.8s"
      fill="freeze"/>
    <animate
      attributeName="opacity"
      values="1;0;1;0;1"
      dur="0.7s"
      repeatCount="indefinite"/>
  </rect>

  <!-- Subtitle -->
  <text
    x="92"
    y="155"
    font-size="18"
    font-family="'Share Tech Mono', monospace"
    fill="#ff3355">
    > SYSTEM ACCESS GRANTED
  </text>

</svg>
